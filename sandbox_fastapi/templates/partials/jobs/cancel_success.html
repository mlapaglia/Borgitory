<!-- Job Cancellation Success -->
<div class="bg-orange-50 dark:bg-orange-900 border border-orange-200 dark:border-orange-700 rounded-lg p-4">
    <div class="flex items-center">
        <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-orange-400" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.293l-3-3a1 1 0 00-1.414 1.414L10.586 9.5 9.293 10.793a1 1 0 101.414 1.414L12 10.914l1.293 1.293a1 1 0 001.414-1.414L13.414 9.5l1.293-1.293a1 1 0 00-1.414-1.414L12 8.207l-1.293-1.293z" clip-rule="evenodd" />
            </svg>
        </div>
        <div class="ml-3">
            <h3 class="text-sm font-medium text-orange-800 dark:text-orange-200">
                Job Cancelled
            </h3>
            <div class="mt-2 text-sm text-orange-700 dark:text-orange-300">
                <p>{{ message }}</p>
            </div>
        </div>
    </div>
    
    <!-- Auto-refresh job list after cancellation -->
    <div hx-get="/api/jobs/" hx-trigger="load delay:1s" hx-target="#job-list" hx-swap="innerHTML"></div>
</div>
