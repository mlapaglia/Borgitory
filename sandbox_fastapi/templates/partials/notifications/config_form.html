<!-- Notification Configuration Form -->
<div class="border dark:border-gray-600 rounded-lg p-4">
    <h3 class="font-medium text-gray-900 dark:text-gray-100 mb-4">
        📱 Create Notification Configuration
    </h3>
    
    <form 
        hx-post="/api/notifications/create"
        hx-target="#notification-config-result"
        hx-swap="innerHTML"
        class="space-y-4"
    >
        <!-- Configuration Name -->
        <div>
            <label class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1">
                Configuration Name
            </label>
            <input type="text" name="name" required
                   class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 rounded-md px-3 py-2 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                   placeholder="My Pushover Config">
        </div>
        
        <!-- Provider Selection -->
        <div>
            <label class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1">
                Notification Provider
            </label>
            <select name="provider" 
                    class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 rounded-md px-3 py-2 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                {% for provider in providers %}
                <option value="{{ provider.value }}">{{ provider.value.title() }}</option>
                {% endfor %}
            </select>
        </div>
        
        <!-- Pushover User Key -->
        <div>
            <label class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1">
                Pushover User Key
            </label>
            <input type="text" name="user_key" required
                   class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 rounded-md px-3 py-2 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm"
                   placeholder="Your Pushover user key">
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                Get from <a href="https://pushover.net" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline">pushover.net</a>
            </p>
        </div>
        
        <!-- Pushover App Token -->
        <div>
            <label class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1">
                Pushover App Token
            </label>
            <input type="text" name="app_token" required
                   class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 rounded-md px-3 py-2 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm"
                   placeholder="Your Pushover app token">
        </div>
        
        <!-- Enabled Toggle -->
        <div class="flex items-center">
            <input type="checkbox" name="enabled" value="true" checked
                   class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 dark:border-gray-600 rounded">
            <label class="ml-2 text-sm text-gray-900 dark:text-gray-100">
                Enable notifications
            </label>
        </div>
        
        <!-- Submit Button -->
        <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition duration-200">
            Create Configuration
        </button>
    </form>
    
    <!-- Result Display -->
    <div id="notification-config-result" class="mt-4"></div>
</div>
